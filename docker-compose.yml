version: '3.8'

services:
  lbsnaa-forms:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - ADMIN_PASSWORD=admin
      - SECRET_KEY=dev-secret-change-this
      - DATA_DIR=/app/data
      # Set your OpenAI API key in a .env file (never commit secrets!)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - lbsnaa-data:/app/data
      - lbsnaa-temp:/app/temp_uploads
      - ./models:/app/models:ro
      - ./celebrity_reference:/app/celebrity_reference:ro
    restart: unless-stopped

volumes:
  lbsnaa-data:
  lbsnaa-temp:
